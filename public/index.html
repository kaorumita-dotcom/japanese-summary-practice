<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>日本語要約練習</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-labelledby="app-title">
        <div class="title-row">
          <div>
            <h1 id="app-title">日本語要約練習</h1>
          </div>
          <div class="status-pill" id="api-status" hidden>AI準備中</div>
        </div>

        <form id="summary-form" class="practice-form">
          <label class="field-block" for="source-text">
            <span class="label-row">
              <span>原文</span>
              <span class="hint">教員が用意した文章を貼り付け</span>
            </span>
            <textarea id="source-text" name="sourceText" rows="8" placeholder="ここに原文を貼り付けてください"></textarea>
          </label>

          <div class="meter-grid" aria-live="polite">
            <div>
              <span class="meter-label">原文</span>
              <strong id="source-count">0</strong><span>文字</span>
            </div>
            <div>
              <span class="meter-label">目標</span>
              <strong id="target-count">0</strong><span>文字</span>
            </div>
            <div>
              <span class="meter-label">要約</span>
              <strong id="summary-count">0</strong><span>文字</span>
            </div>
          </div>

          <label class="field-block" for="summary-text">
            <span class="label-row">
              <span>要約</span>
              <span class="hint">貼り付け不可。自分で入力</span>
            </span>
            <textarea id="summary-text" name="summaryText" rows="6" placeholder="原文の約半分の文字数で要約してください" autocomplete="off" spellcheck="false"></textarea>
          </label>

          <p class="notice" id="paste-notice" role="status" aria-live="polite"></p>

          <div class="action-row">
            <button type="submit" id="submit-button">
              <span class="button-icon" aria-hidden="true">✓</span>
              AIフィードバックを受ける
            </button>
            <button type="button" class="secondary-button" id="clear-button">
              <span class="button-icon" aria-hidden="true">×</span>
              入力を消す
            </button>
          </div>
        </form>
      </section>

      <section class="feedback-panel" aria-labelledby="feedback-title">
        <div class="panel-header">
          <h2 id="feedback-title">フィードバック</h2>
          <span id="quota-text">上限確認中</span>
        </div>
        <div id="feedback-empty" class="empty-state">
          提出すると、要点、圧縮度、日本語表現、改善ポイント、模範回答が表示されます。
        </div>
        <div id="feedback-result" class="feedback-result" hidden></div>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
